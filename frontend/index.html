<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookingApp</title>
    <link rel="stylesheet" href="/frontend/style.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>BookingApp</h1>
            <div id="auth-section">
                <!-- Login form or User info will be injected here -->
            </div>
        </header>

        <main id="main-content" style="display: none;">
            <section id="admin-panel" style="display: none;">
                <h2>Admin Panel</h2>
                <form id="create-user-form">
                    <h3>Create User</h3>
                    <input type="text" id="new-fullname" placeholder="Full Name" required>
                    <input type="text" id="new-apt" placeholder="Apartment Code (e.g. 2A)" required pattern="\d+[A-Z]">
                    <input type="text" id="new-username" placeholder="Username" required>
                    <input type="password" id="new-password" placeholder="Password" required>
                    <select id="new-role">
                        <option value="0">User</option>
                        <option value="1">Admin</option>
                    </select>
                    <button type="submit">Create User</button>
                    <div id="create-user-msg"></div>
                </form>

                <form id="reset-password-form">
                    <h3>Reset User Password</h3>
                    <select id="reset-user-select" required>
                        <option value="">Select User...</option>
                    </select>
                    <input type="password" id="reset-new-password" placeholder="New Password" required>
                    <button type="submit">Reset Password</button>
                    <div id="reset-password-msg"></div>
                </form>

                <div id="manage-users-section">
                    <h3>Manage Users</h3>
                    <table id="users-table">
                        <thead>
                            <tr>
                                <th>Full Name</th>
                                <th>Apt</th>
                                <th>Username</th>
                                <th>Status</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody id="users-tbody">
                            <!-- Rows injected via JS -->
                        </tbody>
                    </table>
                </div>
            </section>

            <section id="booking-section">
                <div class="calendar-controls">
                    <button id="prev-month">Previous Month</button>
                    <h2 id="current-month-display"></h2>
                    <button id="next-month">Next Month</button>
                </div>

                <table id="booking-table">
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Day Slot</th>
                            <th>Night Slot</th>
                        </tr>
                    </thead>
                    <tbody id="booking-tbody">
                        <!-- Rows injected via JS -->
                    </tbody>
                </table>
            </section>
        </main>
    </div>
    <div id="custom-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <p id="modal-message"></p>
            <div class="modal-actions">
                <button id="modal-yes-btn">Yes</button>
                <button id="modal-cancel-btn">Cancel</button>
                <button id="modal-ok-btn" style="display: none;">OK</button>
            </div>
        </div>
    </div>
    <script src="/frontend/app.js"></script>
</body>
</html>
